<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../src/output.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.19/index.global.min.css" rel="stylesheet">
</head>

<body>
    <header class="">
        <!-- <div id="nav" class=" flex justify-between items-center ml-10 mt-2 mr-10 py-2"> -->
        <div id="nav" class="flex flex-col sm:flex-row gap-3 sm:justify-between sm:items-center px-4 sm:px-10 mt-2">
            <h3 class="text-2xl text-blue-500 font-bold">MINO</h3>
            <!-- <h1 id="myNotes" class="font-bold">MY NOTES</h1> -->
            <button id="myNotes"
                class=" flex items-center gap-3 px-4 py-2 rounded-xl cursor-pointer text-gray-600 font-medium hover:bg-blue-50 hover:text-blue-600 ">My
                Notes</button>

            <input id="searchInput"
                class="w-full sm:w-72 px-4 py-2 bg-white border border-gray-300 rounded-xl shadow-sm outline-none text-gray-700 placeholder-gray-400 transition-all duration-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 focus:shadow-lg "
                type="text" placeholder="Search" />
            <div class="relative group">

                <!-- USER ICON -->
                <!-- <img  id="userBtn" class="w-9 h-9 cursor-pointer"
                    src="https://www.iconpacks.net/icons/2/free-user-icon-3296-thumb.png" /> -->
                <div id="userBox"></div>


            </div>





        </div>

    </header>
    <main>
        <div class="bg-gray-100 w-full min-h-screen flex justify-between ">
            <!-- <div class="w-1/6 bg-white/60   backdrop-blur-xl border-white/30 shadow-lg"> -->
            <div
                class="w-full sm:w-1/6 relative overflow-hidden bg-white/600 backdrop-blur-xl border-r border-white/30 shadow-lg">
                <ul class="mt-10 space-y-3 px-4">
                    <li id="addNoteBtn"
                        class="flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer text-gray-600 font-medium hover:bg-blue-50 hover:text-blue-600 hover:translate-x-2 transition-all duration-300">
                        Add New</li>
                    <li id="calendarBtn"
                        class="flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer text-gray-600 font-medium hover:bg-blue-50 hover:text-blue-600 hover:translate-x-2 transition-all duration-300">
                        Calendar </li>
                    <!-- <li
                        class="flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer text-gray-600 font-medium hover:bg-blue-50 hover:text-blue-600 hover:translate-x-2 transition-all duration-300">
                        Archive </li> -->
                    <li id="trash"
                        class="flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer text-gray-600 font-medium hover:bg-blue-50 hover:text-blue-600 hover:translate-x-2 transition-all duration-300">
                        Trash </li>
                    <li onclick="logout()"
                        class="flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer text-gray-600 font-medium hover:bg-blue-50 hover:text-blue-600 hover:translate-x-2 transition-all duration-300">
                        LogOut</li>
                </ul>
            </div>

            <div class="flex-1 flex flex-col  items-center justify-center">
                <h1 id="welcomeTxt"
                    class=" text-2xl sm:text-6xl mb-8 font-bold bg-gradient-to-r from-blue-500 via-purple-500 to-pink-500 bg-clip-text text-transparent animate-pulse">
                    Welcome to Mino Notes</h1>
                <div class="flex gap-4">
                    <button id="loginBtn"
                        class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded-lg transition">Login</button>
                    <button id="signupBtn"
                        class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded-lg transition">SignUp</button>
                </div>
                <div id="calendar" class="hidden relative bg-white rounded-2xl shadow-lg border border-gray-200 max-w-4xl mx-auto p-4">
                     <button id="closeCalendar" class="absolute top-2 right-2 bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded-lg font-bold">
                       X 
                    </button>
                    <div 
                        class="hidden relative p-4 bg-white rounded-2xl shadow-lg border border-gray-200 max-w-4xl mx-auto">
                    </div>
                   
                    
                </div>

                <div id="authModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center">

                    <div class="bg-white p-6 rounded-xl w-[90%] sm:w-96">
                        <h2 id="modalTitle" class="text-2xl font-bold mb-4">Login</h2>

                        <input id="username" type="text" placeholder="Username" class="w-full border p-2 mb-3 rounded">

                        <input id="password" type="password" placeholder="Password"
                            class="w-full border p-2 mb-4 rounded">

                        <button id="submitBtn" class="w-full bg-blue-500 text-white py-2 rounded">
                            Submit
                        </button>

                        <button id="closeBtn" class="w-full mt-2 bg-gray-500 text-white py-2 rounded">
                            Close
                        </button>
                    </div>
                </div>
                <div>

                </div>


                <div id="notesContainer"
                    class=" hidden w-full grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4 justify-start p-4 overflow-y-auto max-h-[calc(100vh-120px)]">
                </div>
                <div id="noteModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center">

                    <div class="bg-white p-6 rounded-xl w-[90%] sm:w-96">

                        <h2 class="text-xl font-bold mb-3">Add Note</h2>

                        <!-- <input id="noteTitle" class="w-full border p-2 mb-3 rounded" placeholder="Title"> -->
                        <textarea id="noteTitle" class="w-full border p-2 mb-3 rounded" placeholder="Title"
                            rows="1"></textarea>
                        <!-- <div class="max-w-lg"> -->
                        <textarea id="noteDesc" class="w-full border p-2 mb-3 rounded line-clamp-4"
                            placeholder="Description"></textarea>
                        <!-- </div> -->

                        <button id="saveNoteBtn" class="w-full bg-blue-500 text-white py-2 rounded">
                            Save Note
                        </button>

                    </div>
                </div>



                <div id="viewNoteModal"
                    class="hidden fixed inset-0 bg-black/30 backdrop-blur-sm flex items-center justify-center z-50">
                    <div id="popupCard"
                        class="relative w-[650px] max-w-[92%] rounded-3xl shadow-2xl overflow-hidden bg-blue-50 transition-all duration-700">

                        <!-- Gradient Header -->
                        <!-- <div class="h-3 bg-gradient-to-r from-blue-500 via-purple-500 to-pink-500"></div> -->

                        <!-- Close Button -->
                        <button onclick="closeViewNote()"
                            class="absolute top-4 right-4 w-9 h-9 flex items-center justify-center rounded-full bg-gray-100 hover:bg-red-100 hover:text-red-500 transition">
                            ✕
                        </button>

                        <div class="p-8">

                            <!-- Title -->
                            <h2 id="viewTitle" class="text-3xl font-bold text-gray-800 mb-3 break-words">
                            </h2>

                            <!-- Date Badge -->
                            <div id="viewDate"
                                class="inline-block px-3 py-1 rounded-full bg-blue-100 text-blue-600 text-xs font-semibold mb-5">
                            </div>

                            <!-- Description -->
                            <div class="max-h-[350px] overflow-y-auto">
                                <p id="viewDesc" class="text-gray-700 leading-7 whitespace-pre-wrap">
                                </p>
                            </div>

                        </div>
                    </div>
                </div>



            </div>
        </div>
    </main>
    <footer></footer>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.19/index.global.min.js"></script>
    <script src="../src/app.js"></script>
</body>

</html>
